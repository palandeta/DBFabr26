apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-pablo
  namespace: mensajes
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: auth-service-pablo
  template:
    metadata:
      labels:
        app: auth-service-pablo
    spec:
      containers:
      - name: auth-service-pablo
        image: palandeta/auth-service-abr26:latest
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          value: "mysql-service"
        - name: MYSQL_USER
          value: "root"
        - name: MYSQL_PASSWORD
          value: "password"
        - name: MYSQL_DB
          value: "auth_db"
        - name: JWT_SECRET_KEY
          value: "123456"
---
apiVersion: v1
kind: Service
metadata: 
  name: auth-service-pablo
  namespace: mensajes
spec:
  selector:
    app: auth-service-pablo
  ports:
  - port: 5000
    targetPort: 5000