apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-pablo
  namespace: mensajes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-pablo
  template:
    metadata:
      labels:
        app: api-gateway-pablo
    spec:
      containers:
      - name: api-gateway-pablo
        image: palandeta/api-gateway-abr26:latest
        ports:
        - containerPort: 5002
        env:
        - name: AUTH_SERVICE_HOST
          value: "auth-service-pablo"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: mensajes
spec:
  selector:
    app: api-gateway-pablo
  ports:
  - port: 80
    targetPort: 5002