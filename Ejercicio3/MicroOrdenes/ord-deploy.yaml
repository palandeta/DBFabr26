apiVersion: apps/v1
kind: Deployment
metadata:
  name: ord-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: ord-service
        image: palandeta/ordpabloabr26
        ports: 
        - containerPort: 5002